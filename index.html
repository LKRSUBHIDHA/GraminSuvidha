<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग्राम समाधान पोर्टल - बिहार</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind:wght@400;600;700&display=swap');
        body { font-family: 'Hind', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-gradient-to-r from-blue-800 to-indigo-900 text-white py-8 px-4 text-center shadow-xl rounded-b-[40px]">
        <h1 class="text-2xl font-extrabold">ग्राम समाधान पोर्टल</h1>
        <p class="text-blue-200 text-[10px] uppercase tracking-widest font-bold">बिहार ग्रामीण डिजिटल सेवा</p>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-8 pb-12">
        <div class="bg-white p-5 rounded-3xl shadow-2xl border border-gray-100">
            <h2 class="text-md font-bold text-gray-700 mb-5 flex items-center gap-2">
                <i class="fas fa-edit text-blue-600"></i> अपनी शिकायत दर्ज करें
            </h2>
            
            <form action="https://formspree.io/f/xojysqnn" method="POST" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" name="Name" placeholder="आपका नाम" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                    <input type="tel" name="Mobile" placeholder="मोबाइल नंबर" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 ml-2 mb-1">जिला चुनें</label>
                    <select id="district" name="District" onchange="loadBlocks()" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                        <option value="">-- जिला चुनें --</option>
                        </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <select id="block" name="Block" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                        <option value="">Block चुनें</option>
                    </select>
                    <input type="text" name="Village" placeholder="गाँव/वार्ड" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none" required>
                </div>

                <textarea name="Complaint" placeholder="अपनी समस्या विस्तार से लिखें..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl h-28 outline-none" required></textarea>

                <button type="submit" class="w-full bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">
                    शिकायात सबमिट करें
                </button>
            </form>
        </div>
    </main>

    <footer class="text-center py-6">
        <p class="text-[11px] text-gray-400">लखीसराय, बिहार | help@gramin.in</p>
    </footer>

    <script>
        const districtData = {
            "Araria": ["Araria", "Forbesganj", "Jokihat"], "Arwal": ["Arwal", "Kaler"], "Aurangabad": ["Aurangabad", "Daudnagar"],
            "Banka": ["Banka", "Amarpur"], "Begusarai": ["Begusarai", "Barauni"], "Bhagalpur": ["Jagdishpur", "Sultanganj"],
            "Bhojpur": ["Arrah", "Jagdishpur"], "Buxar": ["Buxar", "Dumraon"], "Darbhanga": ["Darbhanga", "Benipur"],
            "East Champaran": ["Motihari", "Raxaul"], "Gaya": ["Gaya Sadar", "Bodh Gaya"], "Gopalganj": ["Gopalganj", "Hathua"],
            "Jamui": ["Jamui", "Jhajha"], "Jehanabad": ["Jehanabad", "Makhdumpur"], "Kaimur": ["Bhabua", "Mohania"],
            "Katihar": ["Katihar", "Barsoi"], "Khagaria": ["Khagaria", "Gogri"], "Kishanganj": ["Kishanganj", "Bahadurganj"],
            "Lakhisarai": ["Lakhisarai Sadar", "Surajgarha", "Barahiya", "Halsi", "Ramgarh Chowk", "Chanan", "Pipariya"],
            "Madhepura": ["Madhepura", "Udakishunganj"], "Madhubani": ["Madhubani", "Jainagar"], "Munger": ["Munger", "Jamalpur"],
            "Muzaffarpur": ["Muzaffarpur", "Motipur"], "Nalanda": ["Bihar Sharif", "Rajgir"], "Nawada": ["Nawada", "Rajauli"],
            "Patna": ["Patna Sadar", "Danapur", "Barh"], "Purnia": ["Purnia", "Banmankhi"], "Rohtas": ["Sasaram", "Dehri"],
            "Saharsa": ["Saharsa", "Simri Bakhtiarpur"], "Samastipur": ["Samastipur", "Rosera"], "Saran": ["Chapra", "Sonepur"],
            "Sheikhpura": ["Sheikhpura", "Barbigha"], "Sheohar": ["Sheohar"], "Sitamarhi": ["Sitamarhi", "Pupri"],
            "Siwan": ["Siwan", "Maharajganj"], "Supaul": ["Supaul", "Triveniganj"], "Vaishali": ["Hajipur", "Mahua"],
            "West Champaran": ["Bettiah", "Bagaha"]
        };

        const districtSelect = document.getElementById("district");

        // Direct Load: Districts ko turant bharne ke liye
        const sortedDistricts = Object.keys(districtData).sort();
        sortedDistricts.forEach(dist => {
            const opt = document.createElement("option");
            opt.value = dist;
            opt.textContent = dist;
            districtSelect.appendChild(opt);
        });

        function loadBlocks() {
            const blockSelect = document.getElementById("block");
            const selectedDistrict = districtSelect.value;
            blockSelect.innerHTML = '<option value="">Block चुनें</option>';
            
            if (selectedDistrict && districtData[selectedDistrict]) {
                districtData[selectedDistrict].forEach(block => {
                    const option = document.createElement("option");
                    option.value = block;
                    option.textContent = block;
                    blockSelect.appendChild(option);
                });
            }
        }
    </script>
</body>
</html>
