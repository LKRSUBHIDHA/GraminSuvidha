<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gram Samadhan Portal - Bihar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-2">
    <div class="max-w-md mx-auto pt-2 pb-10">
        <div class="text-center mb-3">
            <h1 class="text-2xl font-bold text-blue-800">Gram Samadhan Portal</h1>
            <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">Bihar Gramin Sewa - Lakhisarai</p>
        </div>
        
        <div class="bg-white p-5 rounded-2xl shadow-lg border-t-4 border-blue-600">
            <form action="https://formspree.io/f/xzdyqkab" method="POST" class="space-y-4">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Aapka Naam</label>
                        <input type="text" name="naam" placeholder="Naam" class="w-full p-2.5 border rounded-xl text-sm bg-gray-50 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Mobile No.</label>
                        <input type="tel" name="mobile" placeholder="10 digits" class="w-full p-2.5 border rounded-xl text-sm bg-gray-50 outline-none" required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Apna Jila Chunein</label>
                        <select name="jila" class="w-full p-2.5 border rounded-xl text-sm bg-gray-50 outline-none" required>
                            <option value="">Select Jila</option>
                            <option value="Lakhisarai">Lakhisarai</option>
                            <option value="Patna">Patna</option>
                            <option value="Begusarai">Begusarai</option>
                            <option value="Munger">Munger</option>
                            <option value="Jamui">Jamui</option>
                            <option value="Sheikhpura">Sheikhpura</option>
                            <option value="Bhagalpur">Bhagalpur</option>
                            <option value="Gaya">Gaya</option>
                            <option value="Muzaffarpur">Muzaffarpur</option>
                            <option value="Other">Any Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Gaon ka Naam</label>
                        <input type="text" name="gaon" placeholder="Village name" class="w-full p-2.5 border rounded-xl text-sm bg-gray-50 outline-none" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Ward/Panchayat</label>
                    <input type="text" name="ward" placeholder="Ward No. ya Panchayat" class="w-full p-2.5 border rounded-xl text-sm bg-gray-50 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Samasya ka Poora Vivran</label>
                    <textarea name="samasya" placeholder="Samasya ke baare mein vistar se batayein..." class="w-full p-2.5 border rounded-xl text-sm bg-gray-50 outline-none" rows="4" required></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 active:scale-95 transition-all">Shikayat Darj Karein</button>
            </form>
        </div>
        <p class="text-[9px] text-center text-gray-400 mt-4 px-4 font-medium italic">Sahi jila aur gaon chunne se samadhan jaldi hota hai.</p>
    </div>
</body>
</html>
