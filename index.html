<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग्राम समाधान पोर्टल - बिहार</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind:wght@400;600;700&display=swap');
        body { font-family: 'Hind', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-gradient-to-r from-blue-800 to-indigo-900 text-white py-10 px-4 text-center shadow-xl rounded-b-[50px]">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-white/20 backdrop-blur-md rounded-full mb-4 border border-white/30">
            <i class="fas fa-landmark text-3xl text-yellow-400"></i>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight">ग्राम समाधान पोर्टल</h1>
        <p class="text-blue-200 mt-2 text-xs uppercase tracking-widest font-bold">बिहार ग्रामीण डिजिटल सेवा केंद्र</p>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-10 pb-12">
        <div class="bg-white p-6 rounded-3xl shadow-2xl border border-gray-100">
            <h2 class="text-lg font-bold text-gray-700 mb-6 flex items-center gap-2">
                <i class="fas fa-edit text-blue-600"></i> अपनी शिकायत दर्ज करें
            </h2>
            
            <form action="https://formspree.io/f/xojysqnn" method="POST" class="space-y-4">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 mb-1">आपका नाम</label>
                        <input type="text" name="Name" placeholder="नाम लिखें" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" required>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 mb-1">मोबाइल नंबर</label>
                        <input type="tel" name="Mobile" placeholder="10 Digits" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" required>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-500 mb-1">अपना जिला चुनें</label>
                    <select id="district" name="District" onchange="loadBlocks()" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" required>
                        <option value="">-- जिला चुनें --</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 mb-1">पंचायत/ब्लॉक</label>
                        <select id="block" name="Block" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" required>
                            <option value="">Block चुनें</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 mb-1">गाँव/वार्ड</label>
                        <input type="text" name="Village" placeholder="Village" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" required>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-500 mb-1">समस्या का विवरण</label>
                    <textarea name="Complaint" placeholder="अपनी समस्या विस्तार से लिखें..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-2xl h-32 focus:ring-2 focus:ring-blue-500 outline-none transition-all" required></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2 transform active:scale-95">
                    <i class="fas fa-paper-plane"></i> शिकायत सबमिट करें
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-900 text-white pt-10 pb-6 px-6 rounded-t-[50px] text-center">
        <p class="text-sm text-gray-400">लखीसराय, बिहार | help@gramin.in</p>
        <p class="text-[10px] text-gray-600 italic mt-4 italic">© 2026 ग्राम समाधान पोर्टल</p>
    </footer>
