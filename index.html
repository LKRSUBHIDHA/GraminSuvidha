<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gram Samadhan Portal - Bihar All Districts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-blue-50 p-2">
    <div class="max-w-md mx-auto pt-4 pb-10">
        
        <div class="text-center mb-6 bg-white py-4 rounded-2xl shadow-sm border-b-4 border-orange-500">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-2 border-2 border-blue-200">
                <i class="fas fa-landmark text-blue-800 text-3xl"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-blue-900 tracking-tight">ग्राम समाधान पोर्टल</h1>
            <p class="text-[11px] text-gray-500 font-bold uppercase tracking-widest mt-1">बिहार ग्रामीण सेवा - डिजिटल शिकायत निवारण</p>
        </div>
        
        <div class="bg-white p-6 rounded-3xl shadow-xl border-t-8 border-blue-700">
            <form action="https://formspree.io/f/xzdyqkab" method="POST" class="space-y-4">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-600 mb-1">आपका नाम</label>
                        <input type="text" name="naam" placeholder="Naam Likhein" class="w-full p-3 border-2 border-gray-100 rounded-xl text-sm bg-gray-50 focus:border-blue-500 outline-none transition" required>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-600 mb-1">मोबाइल नंबर</label>
                        <input type="tel" name="mobile" placeholder="10 Digits" class="w-full p-3 border-2 border-gray-100 rounded-xl text-sm bg-gray-50 focus:border-blue-500 outline-none transition" required>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-600 mb-1">अपना जिला चुनें (38 Districts)</label>
                    <select id="district" name="jila" onchange="loadBlocks()" class="w-full p-3 border-2 border-gray-100 rounded-xl text-sm bg-gray-50 focus:border-blue-500 outline-none transition" required>
                        <option value="">-- Jila Chunein --</option>
                        <option value="Araria">Araria</option><option value="Arwal">Arwal</option><option value="Aurangabad">Aurangabad</option>
                        <option value="Banka">Banka</option><option value="Begusarai">Begusarai</option><option value="Bhagalpur">Bhagalpur</option>
                        <option value="Bhojpur">Bhojpur</option><option value="Buxar">Buxar</option><option value="Darbhanga">Darbhanga</option>
                        <option value="East Champaran">East Champaran</option><option value="Gaya">Gaya</option><option value="Gopalganj">Gopalganj</option>
                        <option value="Jamui">Jamui</option><option value="Jehanabad">Jehanabad</option><option value="Kaimur">Kaimur</option>
                        <option value="Katihar">Katihar</option><option value="Khagaria">Khagaria</option><option value="Kishanganj">Kishanganj</option>
                        <option value="Lakhisarai">Lakhisarai</option><option value="Madhepura">Madhepura</option><option value="Madhubani">Madhubani</option>
                        <option value="Munger">Munger</option><option value="Muzaffarpur">Muzaffarpur</option><option value="Nalanda">Nalanda</option>
                        <option value="Nawada">Nawada</option><option value="Patna">Patna</option><option value="Purnia">Purnia</option>
                        <option value="Rohtas">Rohtas</option><option value="Saharsa">Saharsa</option><option value="Samastipur">Samastipur</option>
                        <option value="Saran">Saran</option><option value="Sheikhpura">Sheikhpura</option><option value="Sheohar">Sheohar</option>
                        <option value="Sitamarhi">Sitamarhi</option><option value="Siwan">Siwan</option><option value="Supaul">Supaul</option>
                        <option value="Vaishali">Vaishali</option><option value="West Champaran">West Champaran</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-600 mb-1">पंचायत/ब्लॉक</label>
                        <select id="block" name="block" class="w-full p-3 border-2 border-gray-100 rounded-xl text-sm bg-gray-50 focus:border-blue-500 outline-none transition" required>
                            <option value="">Pehle Jila Chunein</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-600 mb-1">वार्ड/गाँव का नाम</label>
                        <input type="text" name="gaon" placeholder="Village Name" class="w-full p-3 border-2 border-gray-100 rounded-xl text-sm bg-gray-50 focus:border-blue-500 outline-none transition" required>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-600 mb-1">समस्या का पूरा विवरण</label>
                    <textarea name="samasya" placeholder="Apni shikayat vistar se likhein..." class="w-full p-3 border-2 border-gray-100 rounded-xl text-sm bg-gray-50 focus:border-blue-500 outline-none transition" rows="4" required></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-extrabold text-md shadow-lg hover:bg-blue-800 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-paper-plane"></i> शिकायत दर्ज करें
                </button>
            </form>
            <p class="text-[10px] text-center text-gray-400 mt-4 italic">यह पोर्टल ग्रामीणों की सहायता के लिए बनाया गया है।</p>
        </div>
    </div>

        function loadBlocks() {
            const districtSelect = document.getElementById("district");
            const blockSelect = document.getElementById("block");
            const selectedDistrict = districtSelect.value;

            blockSelect.innerHTML = '<option value="">-- Block Chunein --</option>';

            if (districtData[selectedDistrict]) {
                districtData[selectedDistrict].forEach(block => {
                    const option = document.createElement("option");
                    option.value = block;
                    option.textContent = block;
                    blockSelect.appendChild(option);
                });
            } else {
                blockSelect.innerHTML = '<option value="Other">Others</option>';
            }
        }

</body>
</html>
